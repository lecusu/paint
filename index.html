<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sleek Paint App</title>
    <meta name="description" content="A rich, dynamic online paint application built with HTML5 canvas." />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="app">
      <nav id="toolbar">
        <div class="tool-group">
          <button class="tool-btn active" data-tool="PEN" title="Pen Tool">🖊️</button>
          <button class="tool-btn" data-tool="PENCIL" title="Pencil Tool">✏️</button>
          <button class="tool-btn" data-tool="FILL" title="Fill Tool">🪣</button>
          <button class="tool-btn" data-tool="ERASER" title="Eraser Tool">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"></path>
              <path d="M22 21H7"></path>
              <path d="m13.3 17.7-8.4-8.4"></path>
            </svg>
          </button>
          <button class="tool-btn" data-tool="SELECT" title="Selection Tool">⬚</button>
          <button class="tool-btn" data-tool="MAGNIFIER" title="Magnifier (Zoom)">🔍</button>
        </div>
        <div class="tool-group separator"></div>
        <div class="tool-group">
          <input type="color" id="color-picker" value="#000000" title="Current Color">
          <input type="range" id="stroke-size" min="1" max="50" value="5" title="Stroke Size">
          <span id="stroke-value">5px</span>
        </div>
        <div class="tool-group separator"></div>
        <div class="tool-group flex-right">
          <button class="action-btn" id="btn-undo" title="Undo">↩️</button>
          <button class="action-btn" id="btn-redo" title="Redo">↪️</button>
          <input type="file" id="file-load" accept="image/*" style="display: none;">
          <button class="action-btn" id="btn-load" title="Load Image">📂</button>
          <button class="action-btn" id="btn-save" title="Save Image">💾</button>
        </div>
      </nav>
      <main id="canvas-container">
        <div class="canvas-wrapper" id="canvas-wrapper">
          <!-- Main pixel buffer -->
          <canvas id="main-canvas" width="800" height="600"></canvas>
          <!-- Temporary visual overlay for live previews -->
          <canvas id="overlay-canvas" width="800" height="600"></canvas>
        </div>
      </main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
